    <circle cx="47" cy="41" r="25" fill="url(#warm)"/>
    <path d="M31 43c7-18 27-22 38-7-4 18-27 25-38 7Z" fill="#fff4da" stroke="#111" stroke-width="3"/>
    <text x="92" y="55" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="40" font-weight="800" fill="#111">炭吉刈包</text>
