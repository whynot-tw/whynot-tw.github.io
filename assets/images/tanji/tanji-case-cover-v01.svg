<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">炭吉刈包餐車品牌視覺案例封面</title>
  <desc id="desc">以黑、米白與炭火橘呈現菜單、關東旗、貼紙與餐盒等餐車品牌應用。</desc>
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2b35f"/>
      <stop offset="1" stop-color="#b94d24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#111" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="#f5efe4"/>
  <path d="M0 0h1200v150c-180 50-297-27-448 17-156 45-286-36-453 7C190 202 89 192 0 165Z" fill="#111"/>
  <path d="M0 1110c160-42 286 37 430-8 173-54 302 43 468-7 130-39 214 0 302 35v70H0Z" fill="#d76a2c" opacity="0.85"/>

  <g transform="translate(72 56)">
