  <text x="72" y="346" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="76" font-weight="850" fill="#181818">餐車品牌視覺</text>
  <text x="72" y="418" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="36" font-weight="600" fill="#694a38">把現場販售資訊整理成清楚、有記憶點的品牌應用</text>

  <g transform="translate(72 490)" filter="url(#shadow)">
    <rect width="1056" height="450" rx="34" fill="#fffdf8" stroke="#d9cdbd" stroke-width="4"/>

