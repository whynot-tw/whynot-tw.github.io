    <text x="34" y="54" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="25" font-weight="750" fill="#2a211d">菜單設計 ・ 關東旗 ・ 貼紙 ・ 餐盒 ・ 品牌文案</text>
