      <text x="64" y="83" font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif" font-size="34" font-weight="850" fill="#fff">炭吉刈包 MENU</text>
      <g fill="#f6e8cf">
        <rect x="36" y="136" width="398" height="52" rx="12"/>
        <rect x="36" y="204" width="398" height="52" rx="12"/>
